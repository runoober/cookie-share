name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  worker:
    name: Worker tests + deploy dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run Worker integration + contract tests
        run: npm test
      - name: Validate Worker deploy (dry-run)
        run: npm run check

  server:
    name: Node server build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Build TypeScript
        run: npm run build
      - name: Run server + contract tests
        run: npm test
